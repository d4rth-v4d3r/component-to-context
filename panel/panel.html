<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>React Context Picker</title>
  </head>
  <body>
    <header class="hdr">
      <h1>React Context Picker</h1>
      <p class="hint">
        <kbd>Shift</kbd>+<kbd>Option</kbd> (mac) / <kbd>Shift</kbd>+<kbd>Alt</kbd> (Win), or <kbd>⌘</kbd>+<kbd>Shift</kbd> (mac) / <kbd>Ctrl</kbd>+<kbd>Shift</kbd> (Win), then click. Each pick
        appends below.
      </p>
    </header>
    <nav class="tabs" role="tablist" aria-label="Items by status">
      <button type="button" role="tab" id="tab-pending" class="tab" aria-selected="true" aria-controls="panel-pending">
        Pending <span class="tab-count" id="count-pending">0</span>
      </button>
      <button type="button" role="tab" id="tab-done" class="tab" aria-selected="false" aria-controls="panel-done">
        Done <span class="tab-count" id="count-done">0</span>
      </button>
    </nav>
    <div class="lists-wrap">
      <div id="panel-pending" class="list tab-panel" role="tabpanel" aria-labelledby="tab-pending"></div>
      <div id="panel-done" class="list tab-panel hidden" role="tabpanel" aria-labelledby="tab-done" hidden></div>
    </div>
    <footer class="ft">
      <button type="button" id="send" class="btn primary">Send For Review</button>
      <button type="button" id="clear" class="btn">Clear</button>
      <button type="button" id="undo" class="btn ghost hidden">Undo</button>
    </footer>
    <script type="module" src="./panel.ts"></script>
  </body>
</html>
