<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>React Context Picker</title>
  </head>
  <body>
    <header class="hdr">
      <h1>React Context Picker</h1>
      <p class="hint">
        <kbd>Shift</kbd>+<kbd>Option</kbd> (mac) / <kbd>Shift</kbd>+<kbd>Alt</kbd> (Win), or <kbd>⌘</kbd>+<kbd>Shift</kbd> (mac) / <kbd>Ctrl</kbd>+<kbd>Shift</kbd> (Win), then click. Each pick
        appends below.
      </p>
    </header>
    <main id="list" class="list" aria-label="Accumulated context items"></main>
    <footer class="ft">
      <button type="button" id="send" class="btn primary">Send For Review</button>
      <button type="button" id="clear" class="btn">Clear</button>
      <button type="button" id="undo" class="btn ghost hidden">Undo</button>
    </footer>
    <script type="module" src="./panel.ts"></script>
  </body>
</html>
